<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portefølje | Fotograf Spalder – Bilder fra Ringsaker</title>
<meta name="description" content="Se porteføljen til Fotograf Spalder. Kjæledyr, portrett, familie, bryllup og cosplayfoto fra Ringsaker og Innlandet.">
<link rel="icon" type="image/png" href="Untitled-1.png">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FHTXJM4638"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-FHTXJM4638');
</script>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.08);
  --text: #f8fafc;
  --muted: #cbd5e1;
  --line: rgba(255,255,255,0.12);
  --accent: #f59e0b;
  --shadow: 0 18px 40px rgba(0,0,0,0.25);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at top, rgba(245,158,11,0.12), transparent 35%),
    linear-gradient(180deg, #0b1120 0%, #111827 100%);
  color: var(--text);
  padding: 2rem;
}

.container {
  max-width: 1200px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 0.5rem;
}

.lead {
  text-align: center;
  color: var(--muted);
  max-width: 70ch;
  margin: 0 auto 2rem;
}

.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 2rem 0;
}

.tab {
  padding: 0.7rem 1rem;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
  font-weight: 700;
}

.tab.active {
  background: var(--accent);
  color: black;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}

.gallery-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 6px;
  box-shadow: var(--shadow);
}

.gallery img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}

.button {
  display: inline-block;
  margin-top: 2rem;
  padding: 0.8rem 1.2rem;
  background: var(--accent);
  color: black;
  border-radius: 8px;
  text-decoration: none;
  text-align: center;
  font-weight: bold;
}

.button-row {
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
}
</style>
</head>

<body>

<div class="container">
  <h1>Portefølje</h1>
  <p class="lead">
    Her kan du se et utvalg av bilder fra ulike typer fotograferinger. Klikk deg gjennom kategoriene og få en følelse av stil, uttrykk og hvordan jeg jobber.
  </p>

  <div class="tabs">
    <div class="tab active" onclick="showTab(event, 'dyr')">Kjæledyr</div>
    <div class="tab" onclick="showTab(event, 'portrett')">Portrett</div>
    <div class="tab" onclick="showTab(event, 'familie')">Familie</div>
    <div class="tab" onclick="showTab(event, 'bryllup')">Bryllup</div>
    <div class="tab" onclick="showTab(event, 'cosplay')">Cosplay</div>
  </div>

  <!-- KJÆLEDYR -->
  <div id="dyr" class="section active">
    <div class="gallery">
      <div class="gallery-item">
        <img src="hund1.jpg" alt="Hund fotografert utendørs i Ringsaker av Fotograf Spalder" title="Kjæledyrfotograf Ringsaker">
      </div>
      <div class="gallery-item">
        <img src="hund2.jpg" alt="Portrett av hund i naturlig lys i Ringsaker av Fotograf Spalder" title="Hundebilder Ringsaker">
      </div>
      <div class="gallery-item">
        <img src="hund3.jpg" alt="Kjæledyrfoto av hund i Ringsaker av Fotograf Spalder" title="Kjæledyrfotografering Innlandet">
      </div>
      <div class="gallery-item">
        <img src="hund4.jpg" alt="Hund fotografert i bevegelse utendørs av Fotograf Spalder" title="Hund fotograf Ringsaker">
      </div>
      <div class="gallery-item">
        <img src="hund5.jpg" alt="Naturlig hundeportrett tatt i Ringsaker av Fotograf Spalder" title="Profesjonell hundefotograf">
      </div>
      <div class="gallery-item">
        <img src="hund6.jpg" alt="Stemningsfullt kjæledyrfoto i Innlandet av Fotograf Spalder" title="Kjæledyrfoto Innlandet">
      </div>
    </div>
  </div>

  <!-- PORTRETT -->
  <div id="portrett" class="section">
    <div class="gallery">
      <div class="gallery-item">
        <img src="konfirmant.jpg" alt="Portrettfoto i Ringsaker av Fotograf Spalder" title="Portrettfotograf Ringsaker">
      </div>
      <div class="gallery-item">
        <img src="konfirmasjon2.jpg" alt="Naturlig portrett utendørs i Innlandet av Fotograf Spalder" title="Portrettfoto Innlandet">
      </div>
    </div>
  </div>

  <!-- FAMILIE -->
  <div id="familie" class="section">
    <div class="gallery">
      <div class="gallery-item">
        <img src="familie1.jpg" alt="Familiefoto utendørs i Ringsaker av Fotograf Spalder" title="Familiefotograf Ringsaker">
      </div>
      <div class="gallery-item">
        <img src="familie2.jpg" alt="Naturlig familiebilde i Innlandet av Fotograf Spalder" title="Familiefoto Innlandet">
      </div>
    </div>
  </div>

  <!-- BRYLLUP -->
  <div id="bryllup" class="section">
    <div class="gallery">
      <div class="gallery-item">
        <img src="bryllup.jpg" alt="Bryllupsfotografering i Ringsaker av Fotograf Spalder" title="Bryllupsfotograf Ringsaker">
      </div>
      <div class="gallery-item">
        <img src="bryllup2.jpg" alt="Brudepar fotografert utendørs i Innlandet av Fotograf Spalder" title="Bryllupsfoto Innlandet">
      </div>
      <div class="gallery-item">
        <img src="bryllup3.jpg" alt="Dokumentarisk bryllupsbilde tatt av Fotograf Spalder" title="Bryllupsbilder Ringsaker">
    </div>
  </div>

  <!-- COSPLAY -->
  <div id="cosplay" class="section">
    <div class="gallery">
      <div class="gallery-item">
        <img src="cosplay2.jpg" alt="Cosplay fotografering i Ringsaker av Fotograf Spalder" title="Cosplay fotograf Ringsaker">
      </div>
      <div class="gallery-item">
        <img src="cospaly1.jpg" alt="Cosplay portrett med effekter fotografert av Fotograf Spalder" title="Cosplay foto Innlandet">
    </div>
  </div>

  <div class="button-row">
    <a href="booking.html" class="button">Book fotografering</a>
    <a href="index.html" class="button">Tilbake til forsiden</a>
  </div>
</div>

<script>
function showTab(event, tab) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  document.getElementById(tab).classList.add("active");
  event.target.classList.add("active");
}
</script>

</body>
</html>
