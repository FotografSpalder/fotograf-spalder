<!DOCTYPE html>
<html lang="no">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FHTXJM4638"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-FHTXJM4638');
</script>
  <meta charset="UTF-8">
  <title>Book fotografering | Fotograf Spalder</title>
  <link rel="icon" type="image/png" href="Untitled-1.png">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }

    form {
      display: grid;
      gap: 0.8rem;
    }

    input, select, textarea {
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111827;
      color: white;
    }

    button {
      padding: 0.9rem;
      background: #f59e0b;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Book fotografering</h1>

<form id="bookingForm">

<input type="hidden" name="_subject" value="Ny booking forespørsel – Fotograf Spalder">

<input type="text" name="navn" placeholder="Navn" required>

  <input type="tel" name="telefon" placeholder="Telefonnummer">

 <label>Hva ønsker du å booke?</label>
<select name="pakke" required>
  <option value="">Velg type fotografering eller pakke</option>

  <optgroup label="Vanlige fotoshoots">
    <option>Grunnpakke – 2500 kr</option>
    <option>Favorittpakke – 4500 kr</option>
    <option>Totalpakke – 8000 kr</option>
  </optgroup>

  <optgroup label="Kjæledyr">
    <option>Kjæledyr mini – 1500 kr</option>
    <option>Kjæledyr standard – 2500 kr</option>
    <option>Kjæledyr premium – 4000 kr</option>
  </optgroup>

  <optgroup label="Portrett og familie">
    <option>Portrett – 1200 kr</option>
    <option>Familiefoto – 1800 kr</option>
  </optgroup>

  <optgroup label="Arrangement">
    <option>Konfirmasjon – fra 2000 kr</option>
    <option>Dåp – fra 2000 kr</option>
    <option>Bryllup – fra 6000 kr</option>
    <option>Slektsfotografering – 5500 kr</option>
  </optgroup>

  <optgroup label="Cosplay">
    <option>Cosplay Grunnpakke – 1200 kr</option>
    <option>Cosplay Magipakke – 1800 kr</option>
    <option>Cosplay Epos – 2800 kr</option>
  </optgroup>
</select>

  <label>Hva ønsker du mest informasjon om?</label>
<select name="ønske">
  <option value="">Velg gjerne</option>
  <option>Pris og innhold</option>
  <option>Ledig dato</option>
  <option>Hvilken pakke som passer best</option>
  <option>Redigering og bildefiler</option>
  <option>Vet ikke helt enda</option>
</select>

  <label>Hvor mange personer/dyr?</label>
  <input type="number" name="antall" min="1">

  <label>Ønsket dato</label>
  <input type="date" name="dato">

  <label>Hvor skal fotograferingen skje?</label>
  <select name="sted">
    <option>Utendørs</option>
    <option>Hjemme hos meg</option>
    <option>Vet ikke enda</option>
  </select>

 <label>Beskriv kort hva du ønsker</label>
<textarea name="melding" rows="5" placeholder="Fortell gjerne hva slags fotografering du ønsker, hvor mange som skal være med, ønsket sted og dato, og om det gjelder bryllup, dåp eller konfirmasjon hvor du ønsker tilpasset tilbud."></textarea>

  <!-- spam filter -->
  <input type="text" name="_gotcha" style="display:none">

  <p style="font-size:0.9rem; color:#cbd5e1; margin-top:1rem;">
Et depositum på 30% av totalprisen må betales for å sikre booking. Resterende betales etter fotograferingen. Enten på stedet, eller senere når bildene er klare.
</p>

  <button type="submit">Send forespørsel</button>

</form>
<script>
const form = document.getElementById("bookingForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = new FormData(form);

  const response = await fetch("https://formspree.io/f/xeepjwnb", {
    method: "POST",
    body: data,
    headers: { 'Accept': 'application/json' }
  });

  if (response.ok) {

    // 🔥 SEND EVENT TIL GOOGLE ANALYTICS
    gtag('event', 'booking_sent', {
      event_category: 'booking',
      event_label: 'booking_form'
    });

    // redirect
    window.location.href = "takk.html";

  } else {
    alert("Noe gikk galt. Prøv igjen.");
  }
});
</script>
</body>
</html>
